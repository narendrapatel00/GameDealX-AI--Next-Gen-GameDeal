# .render.yaml – Render deployment configuration

services:
  # Backend service – Dockerized Flask API
  - type: web
    name: gamedealx-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
    # Expose port 5000 (default for Flask)
    # Render auto‑maps the container's EXPOSE to the service URL

  # Frontend service – static site built with Vite
  - type: web
    name: gamedealx-frontend
    env: static
    buildCommand: npm ci && npm run build
    publishPath: dist
    plan: free
    # CORS is already allowed in the Flask app, so the frontend can call the backend URL
